# Lint + typecheck + test + build. Auto-triggers stripped (sc-git): CI runs
# locally on every push via .git/hooks/pre-push, so this no longer burns cloud
# Actions minutes. Kept runnable on demand from the Actions tab (workflow_dispatch)
# and easy to restore — original push/PR triggers live in git history.
# No Convex credentials needed: without CONVEX_DEPLOY_KEY the build falls back to
# a plain `next build` against the committed convex/_generated (build:auto).
name: CI

on:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
