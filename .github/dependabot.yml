# Weekly dependency PRs, grouped so updates arrive as one reviewable PR instead
# of a flood. This template deploys Vercel-only (no GitHub Actions) — each PR is
# validated by its Vercel preview build.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-dependencies:
        patterns: ["*"]
